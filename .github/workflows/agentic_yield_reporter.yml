name: Autonomous Agent on bond yields

on:
  schedule:
    # Runs at 5:00 PM EST (21:00 UTC) on the 1st of every month
    - cron: '0 21 1 * *'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install libraries
      run: |
        pip install pandas requests python-dotenv google-genai tabulate

    - name: Run AI Research Agent
      env:
        # Pulling your API keys directly from GitHub Secrets
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python yield_reporting_agent.py

    - name: Save Macro Report to GitHub (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: weekly-macro-report
        # Uses a wildcard to automatically grab whatever .md file Gemini generates today
        path: "*.md"